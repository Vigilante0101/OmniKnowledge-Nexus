<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OmniKnowledge Nexus | Core Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Segoe+UI:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #1877f2;
            --bg-color: #f0f2f5;
            --text-secondary: #65676b;
        }

        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: var(--bg-color); 
            color: #333; 
            margin: 0; 
            height: 100vh; 
            width: 100vw;
            overflow: hidden; 
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .init-container {
            text-align: center;
            background: white;
            padding: 50px 40px;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.05);
            max-width: 450px;
            width: 90%;
        }

        .nexus-logo {
            font-size: 60px;
            margin-bottom: 25px;
            display: inline-block;
            filter: drop-shadow(0 5px 15px rgba(24, 119, 242, 0.2));
            animation: pulse 2s infinite;
        }

        h2 { 
            color: var(--primary-color); 
            margin: 0 0 12px 0;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        p { 
            color: var(--text-secondary); 
            line-height: 1.6; 
            margin-bottom: 25px;
            font-size: 15px;
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 20px;
            background: #f0f7ff;
            color: var(--primary-color);
            border-radius: 30px;
            font-size: 13px;
            font-weight: 600;
            border: 1px solid #d0e5ff;
        }

        .loader-dots {
            display: flex;
            gap: 4px;
            justify-content: center;
            margin-top: 15px;
        }

        .dot {
            width: 6px;
            height: 6px;
            background: var(--primary-color);
            border-radius: 50%;
            animation: dot-blink 1.4s infinite both;
        }

        .dot:nth-child(2) { animation-delay: 0.2s; }
        .dot:nth-child(3) { animation-delay: 0.4s; }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        @keyframes dot-blink {
            0%, 80%, 100% { opacity: 0; }
            40% { opacity: 1; }
        }

        noscript {
            display: block;
            margin-top: 20px;
            color: #d93025;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="init-container">
        <div class="nexus-logo">🌌</div>
        <h2>OmniKnowledge Nexus</h2>
        <p>Synchronizing local database and constructing visual architecture...</p>
        
        <div class="status-badge">
            Waiting for Script Injection
        </div>

        <div class="loader-dots">
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
        </div>

        <noscript>
            JavaScript is required to initialize this platform.
        </noscript>
    </div>

    <!-- 
        TECHNICAL NOTE:
        This is a headless frontend. 
        Data rendering and logic are injected via the OmniKnowledge Nexus UserScript.
    -->

</body>
</html>
