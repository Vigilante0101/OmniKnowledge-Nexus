<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OmniKnowledge Nexus | Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Segoe+UI:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        /* التنسيق الأساسي لانتظار التحميل */
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: #f0f2f5; 
            color: #333; 
            margin: 0; 
            height: 100vh; 
            width: 100vw;
            overflow: hidden; 
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .loading-container {
            text-align: center;
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            max-width: 400px;
        }
        .logo-placeholder {
            font-size: 50px;
            margin-bottom: 20px;
        }
        h2 { color: #1877f2; margin-bottom: 10px; }
        p { color: #65676b; line-height: 1.6; }
        .status-badge {
            display: inline-block;
            padding: 5px 15px;
            background: #e7f3ff;
            color: #1877f2;
            border-radius: 15px;
            font-size: 13px;
            font-weight: bold;
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <div class="loading-container">
        <div class="logo-placeholder">🌌</div>
        <h2>OmniKnowledge Nexus</h2>
        <p>جاري مزامنة بياناتك المحلية وبناء الشبكة...</p>
        
        <div id="status" class="status-badge">
            في انتظار Tampermonkey...
        </div>

        <noscript>
            <p style="color: red; margin-top: 20px;">عذراً، يجب تفعيل جافاسكريبت لتشغيل هذه المنصة.</p>
        </noscript>
    </div>

    <!-- 
        ملاحظة للمبرمجين:
        هذا الملف هو مجرد واجهة عرض (Frontend).
        يتم حقن منطق العرض والبيانات بالكامل عبر سكريبت: 
        OmniKnowledge-Nexus.user.js
    -->

</body>
</html>
